{% extends "base.html" %}
{% block title %}Add Registration — Transport Office DBMS{% endblock %}
{% block header %}<div class="page-header"><h2><i class="bi bi-plus-circle-fill me-2"></i>Add Registration</h2><div class="breadcrumb"><a href="/">Dashboard</a> / <a href="{{ url_for('vehicle_registrations.list_records') }}">Registrations</a> / Create</div></div>{% endblock %}
{% block content %}
<div class="card-custom"><div class="card-body"><form method="post" class="form-custom"><div class="row g-3">
    <div class="col-md-6"><label class="form-label">Registration ID *</label><input type="number" class="form-control" name="registration_id" required></div>
    <div class="col-md-6"><label class="form-label">Citizen *</label><select class="form-select" name="citizen_id" required><option value="">— Select —</option>{% for c in citizens %}<option value="{{ c.citizen_id }}">{{ c.citizen_id }} — {{ c.name }}</option>{% endfor %}</select></div>
    <div class="col-md-6"><label class="form-label">Registration Date</label><input type="date" class="form-control" name="registration_date"></div>
    <div class="col-md-6"><label class="form-label">Expiry Date</label><input type="date" class="form-control" name="expiry_date"></div>
</div><div class="mt-4"><button type="submit" class="btn-success-custom"><i class="bi bi-check-lg"></i> Insert</button><a href="{{ url_for('vehicle_registrations.list_records') }}" class="btn-outline-custom ms-2">Cancel</a></div></form></div></div>
{% endblock %}
