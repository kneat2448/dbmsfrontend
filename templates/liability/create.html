{% extends "base.html" %}{% block title %}Add Liability — Transport Office DBMS{% endblock %}
{% block header %}<div class="page-header"><h2><i class="bi bi-plus-circle-fill me-2"></i>Add Liability</h2><div class="breadcrumb"><a href="/">Dashboard</a> / <a href="{{ url_for('liability.list_records') }}">Liability</a> / Create</div></div>{% endblock %}
{% block content %}
<div class="card-custom"><div class="card-body"><form method="post" class="form-custom"><div class="row g-3">
    <div class="col-md-6"><label class="form-label">Liability ID *</label><input type="number" class="form-control" name="liability_id" required></div>
    <div class="col-md-6"><label class="form-label">Liability Type *</label>
        <select class="form-select" name="liability_type" required>
            <option value="">— Select —</option>
            <option value="VIOLATION">VIOLATION</option>
            <option value="TAX">TAX</option>
        </select>
    </div>
    <div class="col-md-6"><label class="form-label">Reference ID *</label><input type="number" class="form-control" name="reference_id" required><small style="color:var(--text-muted);">violation_id or tax_id</small></div>
    <div class="col-md-6"><label class="form-label">Vehicle *</label><select class="form-select" name="vehicle_id" required><option value="">— Select —</option>{% for v in vehicles %}<option value="{{ v.vehicle_id }}">{{ v.vehicle_id }} — {{ v.registration_number or 'N/A' }}</option>{% endfor %}</select></div>
</div><div class="mt-4"><button type="submit" class="btn-success-custom"><i class="bi bi-check-lg"></i> Insert</button><a href="{{ url_for('liability.list_records') }}" class="btn-outline-custom ms-2">Cancel</a></div></form></div></div>
{% endblock %}
