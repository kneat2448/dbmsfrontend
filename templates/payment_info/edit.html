{% extends "base.html" %}{% block title %}Edit Payment — Transport Office DBMS{% endblock %}
{% block header %}<div class="page-header"><h2><i class="bi bi-pencil-fill me-2"></i>Edit Payment Info</h2><div class="breadcrumb"><a href="/">Dashboard</a> / <a href="{{ url_for('payment_info.list_records') }}">Payments</a> / Edit #{{ record['payment_id'] }}</div></div>{% endblock %}
{% block content %}
<div class="card-custom"><div class="card-body"><form method="post" class="form-custom"><div class="row g-3">
    <div class="col-md-6"><label class="form-label">Payment ID</label><input type="number" class="form-control" value="{{ record['payment_id'] }}" disabled></div>
    <div class="col-md-6"><label class="form-label">Payment Mode</label><input type="text" class="form-control" name="payment_mode" value="{{ record['payment_mode'] or '' }}"></div>
    <div class="col-md-6"><label class="form-label">Payment Date</label><input type="date" class="form-control" name="payment_date" value="{{ record['payment_date'] or '' }}"></div>
    <div class="col-md-6"><label class="form-label">Amount Paid</label><input type="number" step="0.01" class="form-control" name="amount_paid" value="{{ record['amount_paid'] or '' }}"></div>
</div><div class="mt-4"><button type="submit" class="btn-success-custom"><i class="bi bi-check-lg"></i> Update</button><a href="{{ url_for('payment_info.view_record', record_id=record['payment_id']) }}" class="btn-outline-custom ms-2">Cancel</a></div></form></div></div>
{% endblock %}
