{% extends "base.html" %}
{% block title %}Edit Vehicle — Transport Office DBMS{% endblock %}
{% block header %}<div class="page-header"><h2><i class="bi bi-pencil-fill me-2"></i>Edit Vehicle</h2><div class="breadcrumb"><a href="/">Dashboard</a> / <a href="{{ url_for('vehicles.list_records') }}">Vehicles</a> / Edit #{{ record['vehicle_id'] }}</div></div>{% endblock %}
{% block content %}
<div class="card-custom"><div class="card-body"><form method="post" class="form-custom"><div class="row g-3">
    <div class="col-md-6"><label class="form-label">Vehicle ID</label><input type="number" class="form-control" value="{{ record['vehicle_id'] }}" disabled></div>
    <div class="col-md-6"><label class="form-label">Owner (Citizen) *</label><select class="form-select" name="citizen_id" required>{% for c in citizens %}<option value="{{ c.citizen_id }}" {% if c.citizen_id==record['citizen_id'] %}selected{% endif %}>{{ c.citizen_id }} — {{ c.name }}</option>{% endfor %}</select></div>
    <div class="col-md-6"><label class="form-label">Registration Number</label><input type="text" class="form-control" name="registration_number" value="{{ record['registration_number'] or '' }}"></div>
    <div class="col-md-6"><label class="form-label">Manufacture Year</label><input type="number" class="form-control" name="manufacture_year" value="{{ record['manufacture_year'] or '' }}"></div>
</div><div class="mt-4"><button type="submit" class="btn-success-custom"><i class="bi bi-check-lg"></i> Update</button><a href="{{ url_for('vehicles.view_record', record_id=record['vehicle_id']) }}" class="btn-outline-custom ms-2">Cancel</a></div></form></div></div>
{% endblock %}
