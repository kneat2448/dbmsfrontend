{% extends "base.html" %}
{% block title %}Add Vehicle — Transport Office DBMS{% endblock %}
{% block header %}<div class="page-header"><h2><i class="bi bi-plus-circle-fill me-2"></i>Add Vehicle</h2><div class="breadcrumb"><a href="/">Dashboard</a> / <a href="{{ url_for('vehicles.list_records') }}">Vehicles</a> / Create</div></div>{% endblock %}
{% block content %}
<div class="card-custom"><div class="card-body"><form method="post" class="form-custom"><div class="row g-3">
    <div class="col-md-6"><label class="form-label">Vehicle ID *</label><input type="number" class="form-control" name="vehicle_id" required></div>
    <div class="col-md-6"><label class="form-label">Owner (Citizen) *</label><select class="form-select" name="citizen_id" required><option value="">— Select —</option>{% for c in citizens %}<option value="{{ c.citizen_id }}">{{ c.citizen_id }} — {{ c.name }}</option>{% endfor %}</select></div>
    <div class="col-md-6"><label class="form-label">Registration Number</label><input type="text" class="form-control" name="registration_number"></div>
    <div class="col-md-6"><label class="form-label">Manufacture Year</label><input type="number" class="form-control" name="manufacture_year" min="1900" max="2099"></div>
</div><div class="mt-4"><button type="submit" class="btn-success-custom"><i class="bi bi-check-lg"></i> Insert</button><a href="{{ url_for('vehicles.list_records') }}" class="btn-outline-custom ms-2">Cancel</a></div></form></div></div>
{% endblock %}
