{% extends "base.html" %}
{% block title %}Edit Citizen — Transport Office DBMS{% endblock %}

{% block header %}
<div class="page-header">
    <h2><i class="bi bi-pencil-fill me-2"></i>Edit Citizen</h2>
    <div class="breadcrumb"><a href="/">Dashboard</a> / <a href="{{ url_for('citizen.list_records') }}">Citizens</a> / Edit #{{ record['citizen_id'] }}</div>
</div>
{% endblock %}

{% block content %}
<div class="card-custom">
    <div class="card-body">
        <form method="post" class="form-custom" id="citizen-edit-form">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Citizen ID</label>
                    <input type="number" class="form-control" value="{{ record['citizen_id'] }}" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="name">Name *</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ record['name'] }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="date_of_birth">Date of Birth *</label>
                    <input type="date" class="form-control" id="date_of_birth" name="date_of_birth" value="{{ record['date_of_birth'] }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" class="form-control" id="email" name="email" value="{{ record['email'] or '' }}">
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn-success-custom"><i class="bi bi-check-lg"></i> Update Record</button>
                <a href="{{ url_for('citizen.view_record', record_id=record['citizen_id']) }}" class="btn-outline-custom ms-2">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
